<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amour Flower Shop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d0d0d;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        .player {
            background: #1a1a1a;
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(255, 105, 180, 0.15);
            text-align: center;
            border: 1px solid #333;
        }

        h1 {
            color: #ff69b4;
            font-size: 24px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        audio {
            width: 300px;
            outline: none;
            border-radius: 30px;
        }

        audio::-webkit-media-controls-panel {
            background: #2a2a2a;
        }

        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display {
            color: #fff;
        }

        .hint {
            color: #666;
            font-size: 12px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="player">
        <h1>Amour Flower Shop</h1>
        <audio id="audioPlayer" controls></audio>
        <p class="hint">برای پخش، یک بار روی صفحه کلیک کنید</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const audio = document.getElementById('audioPlayer');

        // حالت بهتر: فقط id فایل را بگیر و لینک را خودت بساز
        const fileId = params.get('id');
        const directUrl = params.get('m');

        if (fileId) {
            audio.src = `https://docs.google.com/uc?export=download&id=${fileId}`;
        } else if (directUrl) {
            audio.src = directUrl;
        }

        document.addEventListener('click', () => {
            if (audio.paused && audio.src) {
                audio.play().catch(() => {});
            }
        }, { once: true });
    </script>
</body>
</html>
