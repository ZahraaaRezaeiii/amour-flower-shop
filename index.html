<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 پیام ویژه شما</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Tahoma, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card {
    background:white;
    padding:40px 30px;
    border-radius:20px;
    box-shadow:0 20px 60px rgba(0,0,0,.3);
    max-width:450px;
    width:100%;
    text-align:center;
}

.icon {
    font-size:60px;
    margin-bottom:15px;
}

h1 {
    font-size:28px;
    color:#333;
    margin-bottom:10px;
}

.subtitle {
    color:#666;
    margin-bottom:25px;
}

#error {
    color:#e74c3c;
    background:#fde8e8;
    padding:15px;
    border-radius:10px;
    margin-top:20px;
}

.footer {
    margin-top:30px;
    color:#aaa;
    font-size:12px;
}
</style>

</head>

<body>

<div class="card">

<div class="icon">🎁</div>

<h1>این پیام مخصوص شماست</h1>

<p class="subtitle">
لطفاً چند لحظه صبر کنید...
</p>

<div id="player"></div>

<div id="status"></div>

<div class="footer">
✨ با ❤️ برای شما
</div>

</div>


<script>

// موزیک‌ها از Google Drive
const musics = {
    zahra:
    "https://drive.google.com/file/d/1XCwCptfc7oBiizN-3XYcV8YAP2t_c1ZX/preview",

    mahdis:
    "https://drive.google.com/uc?export=download&id=آیدی_فایل_مهدیس"
};


const params = new URLSearchParams(window.location.search);

const user = params.get("user");

const playerDiv = document.getElementById("player");

const statusDiv = document.getElementById("status");


if (user && musics[user]) {

    const iframe = document.createElement("iframe");
    iframe.src = musics[user];
    iframe.width = "100%";
    iframe.height = "80";
    iframe.style.border = "none";
    iframe.allow = "autoplay";

    playerDiv.appendChild(iframe);

    statusDiv.innerHTML = "✅ پیام شما آماده پخش است 🎧";
}
else {
    statusDiv.innerHTML =
    '<div id="error">🔗 لینک نامعتبر است.</div>';
}

</script>

</body>
</html>
