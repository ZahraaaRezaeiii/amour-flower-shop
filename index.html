<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amour Flower Shop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d0d0d; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .player { background: #1a1a1a; padding: 30px 40px; border-radius: 20px; box-shadow: 0 0 40px rgba(255, 105, 180, 0.15); text-align: center; border: 1px solid #333; }
        h1 { color: #ff69b4; font-size: 24px; margin-bottom: 20px; }
        audio { width: 300px; outline: none; border-radius: 30px; }
    </style>
</head>
<body>
    <div class="player">
        <h1>🌸 Amour Flower Shop</h1>
        <audio id="audioPlayer" controls></audio>
        <p style="color:#666; font-size: 12px; margin-top: 15px;">🎵 در صورت پخش نشدن، فایل را در گیت‌هاب آپلود کنید</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let m = urlParams.get('m');
        const audio = document.getElementById('audioPlayer');
        
        // اگر کاربر لینک درایو گوگل را وارد کرد، آن را به لینک مستقیم تبدیل کن
        if (m && m.includes('drive.google.com')) {
            const fileId = m.split('/d/')[1].split('/')[0];
            m = `https://docs.google.com/uc?export=download&id=${fileId}`;
        }

        if (m) {
            audio.src = m;
        }

        document.addEventListener('click', () => {
            if (audio.paused && audio.src) {
                audio.play().catch(e => console.log("خطا در پخش خودکار:", e));
            }
        }, { once: true });
    </script>
</body>
</html>
