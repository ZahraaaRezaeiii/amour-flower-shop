<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 پیام ویژه شما</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        h1 { font-size: 28px; color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 25px; font-size: 16px; }
        .icon { font-size: 60px; margin-bottom: 15px; }
        audio { width: 100%; margin-top: 20px; border-radius: 30px; }
        .error {
            color: #e74c3c;
            background: #fde8e8;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .loading { color: #888; margin-top: 20px; }
        .footer { margin-top: 30px; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🎁</div>
        <h1>این پیام مخصوص شماست</h1>
        <p class="subtitle">لطفاً چند لحظه صبر کنید...</p>
        <div id="player"></div>
        <div id="status"></div>
        <div class="footer">✨ با ❤️ برای شما</div>
    </div>

    <script>
        var path = window.location.pathname;
        var parts = path.split('/').filter(Boolean);
        var folderName = parts[parts.length - 1];

        var playerDiv = document.getElementById('player');
        var statusDiv = document.getElementById('status');

        if (folderName && folderName.length >= 5) {
            var audioUrl = 'sounds/' + folderName + '/music.mp3';
            var audio = new Audio(audioUrl);

            audio.oncanplaythrough = function() {
                statusDiv.innerHTML = '✅ پیام شما آماده پخش است. لذت ببرید! 🎧';
                audio.play().catch(function() {
                    statusDiv.innerHTML = '⚠️ برای پخش، روی دکمه پخش کلیک کنید.';
                });
            };

            audio.onerror = function() {
                statusDiv.innerHTML = '<div class="error">❌ متأسفانه این پیام معتبر نیست. لطفاً با پشتیبانی تماس بگیرید.</div>';
            };

            audio.controls = true;
            audio.style.width = '100%';
            playerDiv.appendChild(audio);
        } else {
            statusDiv.innerHTML = '<div class="error">🔗 لینک نامعتبر است.</div>';
        }
    </script>
</body>
</html>
